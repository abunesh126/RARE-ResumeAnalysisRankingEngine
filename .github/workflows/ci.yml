name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e "./services/resume_embedding[dev]"

      - name: Lint with Ruff
        run: |
          ruff check services/resume_embedding/resume_embedding/ services/resume_embedding/tests/ services/ranking/

      - name: Run tests
        run: |
          pytest services/resume_embedding/tests/ tests/ -v --tb=short